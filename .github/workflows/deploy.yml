name: Deploy Laptop Ecommerce Application

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js Project
        run: npm run build
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'fallback-ci-secret-12345' }}
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

  build-and-deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.DOCKER_REGISTRY || 'docker.io' }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY || 'docker.io' }}/${{ secrets.DOCKER_USERNAME }}/laptop-store-web:latest
            ${{ secrets.DOCKER_REGISTRY || 'docker.io' }}/${{ secrets.DOCKER_USERNAME }}/laptop-store-web:${{ github.sha }}

      - name: Deploy to Ubuntu Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            # Navigate to deployment directory
            mkdir -p ~/apps/laptop-store
            cd ~/apps/laptop-store
            
            # Copy docker-compose config (assuming we write it dynamically or it exists)
            cat << 'EOF' > docker-compose.yml
            version: '3.8'
            services:
              db:
                image: postgres:15-alpine
                container_name: laptop-postgres-db
                restart: always
                environment:
                  POSTGRES_USER: ${{ secrets.DB_USER || 'laptop_admin' }}
                  POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
                  POSTGRES_DB: ${{ secrets.DB_NAME || 'laptop_ecommerce_db' }}
                ports:
                  - "5432:5432"
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U ${{ secrets.DB_USER || 'laptop_admin' }} -d ${{ secrets.DB_NAME || 'laptop_ecommerce_db' }}"]
                  interval: 5s
                  timeout: 5s
                  retries: 5

              web:
                image: ${{ secrets.DOCKER_REGISTRY || 'docker.io' }}/${{ secrets.DOCKER_USERNAME }}/laptop-store-web:latest
                container_name: laptop-next-app
                restart: always
                ports:
                  - "3000:3000"
                environment:
                  - DATABASE_URL=postgresql://${{ secrets.DB_USER || 'laptop_admin' }}:${{ secrets.DB_PASSWORD }}@db:5432/${{ secrets.DB_NAME || 'laptop_ecommerce_db' }}?schema=public
                  - NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
                  - NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
                  - JWT_SECRET=${{ secrets.JWT_SECRET }}
                  - GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
                  - GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
                depends_on:
                  db:
                    condition: service_healthy
            volumes:
              postgres_data:
            EOF
            
            # Pull latest images and restart containers
            docker compose pull
            docker compose up -d --remove-orphans
            
            # Wait for database migration health check
            sleep 10
            
            # Run prisma db push to apply schema inside running container
            docker exec laptop-next-app npx prisma db push --accept-data-loss
            
            # Prune obsolete images to conserve space
            docker image prune -f
